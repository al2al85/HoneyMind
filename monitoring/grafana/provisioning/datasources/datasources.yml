apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      maxLines: 500
      derivedFields:
        - name: session_id
          matcherRegex: '"session_id":"([^"]+)"'
          url: '/d/session-timeline/session-deep-dive?var-session_id=$${__value.raw}'
          datasourceUid: loki

  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    jsonData:
      timeInterval: 15s

services:

  loki:
    image: grafana/loki:3.3.2
    container_name: honeymind-loki
    restart: unless-stopped
    user: "0"
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/tmp/loki
    entrypoint: sh -c "mkdir -p /tmp/loki/rules /tmp/loki/chunks && exec /usr/bin/loki -config.file=/etc/loki/local-config.yaml"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: honeymind-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:11.4.0
    container_name: honeymind-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: honeymind
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_FEATURE_TOGGLES_ENABLE: "publicDashboards"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/01-attack-overview.json
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_UNIFIED_ALERTING_ENABLED: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy

  log-processor:
    build:
      context: ./log_processor
      dockerfile: Dockerfile
    container_name: honeymind-log-processor
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ${HONEYMIND_LOG_DIR:-../logs}:/data/honeypot/logs:ro
      - log-processor-state:/tmp
      - ./log_processor:/app:ro
      # Mount HoneyMind src for attack_classifier
      - ../src:/honeymind_src:ro
    command:
      - "--log-dir=/data/honeypot/logs"
      - "--loki=http://loki:3100"
      - "--metrics-port=9090"
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  loki-data:
  prometheus-data:
  grafana-data:
  log-processor-state:

networks:
  default:
    name: honeymind-monitoring

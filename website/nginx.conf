server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy IOC API (même réseau Docker default)
    location /api/ {
        proxy_pass         http://ioc-api:5000/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Proxy Loki (réseau honeymind-monitoring)
    location /loki/ {
        proxy_pass         http://loki:3100/loki/;
        proxy_set_header   Host $host;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

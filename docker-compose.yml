services:
  honeymind:
    image: honeymind:latest
    container_name: honeymind
    user: "1000:1000"
    stdin_open: true
    tty: true
    ports:
      - "22:22"
      - "8080:80"
    volumes:
      - ./honeypots:/data/honeypot
      - ./logs:/data/honeypot/logs
      - ./downloads:/data/honeypot/downloads
      - ./uploads:/data/honeypot/uploads
    environment:
      HONEYPOT_DOWNLOAD_DIR: /data/honeypot/downloads
      HONEYPOT_UPLOAD_DIR: /data/honeypot/uploads
    env_file:
      - path: config/llm.env.list
        required: false
    restart: unless-stopped

  ioc-writer:
    image: honeymind:latest
    container_name: ioc-writer
    user: "1000:1000"
    entrypoint: ["python", "-u", "-m", "api.ioc_writer"]
    volumes:
      - ./honeypots:/data/honeypot
      - ./logs:/data/honeypot/logs
      - ./downloads:/data/honeypot/downloads
      - ./uploads:/data/honeypot/uploads
    environment:
      LOG_DIR: /data/honeypot/logs
      IOC_DB: /data/honeypot/logs/iocs.db
      HONEYPOT_DOWNLOAD_DIR: /data/honeypot/downloads
      HONEYPOT_UPLOAD_DIR: /data/honeypot/uploads
      IOC_POLL_INTERVAL: "15"
      IOC_CAMPAIGN_INTERVAL: "120"
    restart: unless-stopped
    depends_on:
      - honeymind

  ioc-api:
    image: honeymind:latest
    container_name: ioc-api
    user: "1000:1000"
    entrypoint: ["python", "-u", "-m", "api.ioc_server"]
    ports:
      - "5000:5000"
    volumes:
      - ./honeypots:/data/honeypot
      - ./logs:/data/honeypot/logs
      - ./scripts:/scripts:ro
    environment:
      IOC_DB: /data/honeypot/logs/iocs.db
      LOG_DIR: /data/honeypot/logs
      SCRIPT_PATH: /scripts/analyze_with_llm.py
      IOC_API_HOST: "0.0.0.0"
      IOC_API_PORT: "5000"
    env_file:
      - path: config/llm.env.list
        required: false
    restart: unless-stopped
    depends_on:
      - ioc-writer

  website:
    image: nginx:alpine
    container_name: honeymind-website
    ports:
      - "44806:80"
    volumes:
      - ./website:/usr/share/nginx/html:ro
      - ./website/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      - ioc-api
    networks:
      - default
      - honeymind-monitoring

networks:
  honeymind-monitoring:
    external: true
    name: honeymind-monitoring

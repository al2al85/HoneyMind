services:
  honeymind:
    image: honeymind:latest
    container_name: honeymind
    stdin_open: true
    tty: true
    ports:
      - "22:22"
      - "8080:80"
    volumes:
      - ./honeypots:/data/honeypot
      - ./logs:/data/honeypot/logs
    env_file:
      - config/llm.env.list
    restart: unless-stopped

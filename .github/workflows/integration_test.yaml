name: Optional LLM Integration Tests

on:
  push:
  workflow_dispatch:
    inputs:
      run_bedrock:
        description: "Run live AWS Bedrock integration tests"
        required: false
        default: false
        type: boolean

jobs:
  llm-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      actions: read

    env:
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Cache virtual environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv  # Cache the virtual environment
          key: ${{ runner.os }}-venv-${{ hashFiles('requirements.txt', 'test/test.requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-venv-            

      - name: Create virtual environment
        if: steps.cache-venv.outputs.cache-hit != 'true'  # Only create if cache is missing
        run: python -m venv .venv

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r test/test.requirements.txt

      - name: Decide whether to run Bedrock integration tests
        id: bedrock
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" \
                && "${{ github.event.inputs.run_bedrock }}" == "true" \
                && -n "${AWS_ROLE_TO_ASSUME}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: steps.bedrock.outputs.enabled == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run Bedrock integration tests
        if: steps.bedrock.outputs.enabled == 'true'
        timeout-minutes: 2
        env:
          RUN_BEDROCK_INTEGRATION: "true"
          AWS_REGION: ${{ env.AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
        run: |
          source .venv/bin/activate
          PYTHONPATH=src:test python -m pytest --color=yes test/test_*_integration.py

      - name: Skip optional Bedrock integration tests
        if: steps.bedrock.outputs.enabled != 'true'
        run: |
          echo "Skipping live Bedrock integration tests."
          echo "Run this workflow manually with run_bedrock=true and set AWS_ROLE_TO_ASSUME to enable them."
